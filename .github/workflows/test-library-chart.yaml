name: test-library-chart

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "helm/kubectl-apply-job/**"
      - "test/**"
      - ".github/workflows/test-library-chart.yaml"
  merge_group: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      # yq (mikefarah) is preinstalled on GitHub-hosted ubuntu runners; verify it.
      - name: Check yq
        run: yq --version

      - name: Render and verify document separators
        run: ./test/verify.sh
