name: test-library-chart

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "helm/kubectl-apply-job/**"
      - "test/**"
      - ".github/workflows/test-library-chart.yaml"
  merge_group: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      # yq (mikefarah) is preinstalled on GitHub-hosted ubuntu runners; verify it.
      - name: Check yq
        run: yq --version

      - name: Render and verify document separators
        run: ./test/verify.sh
